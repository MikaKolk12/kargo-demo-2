name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: mikakolk12

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Get short SHA
      id: sha
      run: echo "short=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

    - name: Log in to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push web1
      uses: docker/build-push-action@v5
      with:
        context: web1
        push: true
        tags: ghcr.io/${{ env.OWNER }}/dev/web1:${{ steps.sha.outputs.short }}

    - name: Build and push web2
      uses: docker/build-push-action@v5
      with:
        context: web2
        push: true
        tags: ghcr.io/${{ env.OWNER }}/dev/web2:${{ steps.sha.outputs.short }}
