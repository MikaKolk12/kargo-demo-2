name: Build and Push

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, closed]

jobs:
  build:
    if: (startsWith(github.event.pull_request.head.ref, 'hotfix/') && github.event.action != 'closed') || (github.event.pull_request.merged == true && !startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set lowercase owner
      id: owner
      run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Detect flow type from PR branch
      id: flow
      run: |
        BRANCH="${{ github.event.pull_request.head.ref }}"
        if [[ "$BRANCH" == hotfix/* ]]; then
          echo "type=hotfix" >> $GITHUB_OUTPUT
        else
          echo "type=feature" >> $GITHUB_OUTPUT
        fi

    - name: Set image tag
      id: tag
      run: |
        SHORT_SHA="${GITHUB_SHA:0:7}"
        if [[ "${{ steps.flow.outputs.type }}" == "hotfix" ]]; then
          echo "value=hotfix-${SHORT_SHA}" >> $GITHUB_OUTPUT
        else
          echo "value=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
        fi

    - name: Log in to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push web1
      run: |
        docker buildx build \
          --push \
          --platform linux/amd64,linux/arm64 \
          --tag "ghcr.io/${{ steps.owner.outputs.value }}/web1:${{ steps.tag.outputs.value }}" \
          --annotation "index,manifest:org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
          --annotation "index,manifest:org.opencontainers.image.revision=${{ github.sha }}" \
          web1

    - name: Build and push web2
      run: |
        docker buildx build \
          --push \
          --platform linux/amd64,linux/arm64 \
          --tag "ghcr.io/${{ steps.owner.outputs.value }}/web2:${{ steps.tag.outputs.value }}" \
          --annotation "index,manifest:org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
          --annotation "index,manifest:org.opencontainers.image.revision=${{ github.sha }}" \
          web2

    - name: Summary
      run: |
        echo "### Build complete" >> $GITHUB_STEP_SUMMARY
        echo "- **Flow:** ${{ steps.flow.outputs.type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag:** \`${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Images pushed:**" >> $GITHUB_STEP_SUMMARY
        echo "  - \`ghcr.io/${{ steps.owner.outputs.value }}/web1:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
        echo "  - \`ghcr.io/${{ steps.owner.outputs.value }}/web2:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
